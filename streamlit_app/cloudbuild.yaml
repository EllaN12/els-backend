# ── Google Cloud Build: Build & Deploy Streamlit frontend to Cloud Run ───────
#
# Required substitution variables:
#   _REGION           : GCP region, e.g. us-central1
#   _SERVICE          : Cloud Run service name, e.g. frontend-els
#   _BACKEND_ENDPOINT : Full URL of the deployed FastAPI backend

substitutions:
  _REGION: us-central1
  _SERVICE: frontend-els
  _BACKEND_ENDPOINT: https://backend-els-720685387106.us-central1.run.app

steps:

  # 1. Build the Streamlit Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - gcr.io/${PROJECT_ID}/${_SERVICE}:$COMMIT_SHA
      - -t
      - gcr.io/${PROJECT_ID}/${_SERVICE}:latest
      - .
    dir: "streamlit_app"

  # 2. Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - gcr.io/${PROJECT_ID}/${_SERVICE}
      - --all-tags
    dir: "streamlit_app"

  # 3. Deploy to Cloud Run — pass the backend URL as an env var
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=gcr.io/${PROJECT_ID}/${_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8501
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --timeout=120
      - --set-env-vars=BACKEND_ENDPOINT=${_BACKEND_ENDPOINT}

images:
  - gcr.io/${PROJECT_ID}/${_SERVICE}:$COMMIT_SHA
  - gcr.io/${PROJECT_ID}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
